name: 构建打包 (Build)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空自动生成)'
        required: false
        type: string

  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements_mac.txt
      - name: Generate .icns icon
        run: |
          mkdir -p AppIcon.iconset
          sips -z 16 16   pic.png --out AppIcon.iconset/icon_16x16.png
          sips -z 32 32   pic.png --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32   pic.png --out AppIcon.iconset/icon_32x32.png
          sips -z 64 64   pic.png --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128 pic.png --out AppIcon.iconset/icon_128x128.png
          sips -z 256 256 pic.png --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256 pic.png --out AppIcon.iconset/icon_256x256.png
          sips -z 512 512 pic.png --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512 pic.png --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 pic.png --out AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset
          mv AppIcon.icns app_icon.icns
          rm -rf AppIcon.iconset
      - run: python -m PyInstaller --noconfirm build_mac.spec
      - run: cd dist && zip -r ListeningTrainer-mac.zip ListeningTrainer.app
      - uses: actions/upload-artifact@v4
        with:
          name: ListeningTrainer-mac
          path: dist/ListeningTrainer-mac.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install PySide6 edge-tts aiohttp pyinstaller
      - run: python -m PyInstaller --noconfirm build.spec
      - run: cd dist && Compress-Archive -Path ListeningTrainer -DestinationPath ListeningTrainer-win.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ListeningTrainer-win
          path: dist/ListeningTrainer-win.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ListeningTrainer-mac
      - uses: actions/download-artifact@v4
        with:
          name: ListeningTrainer-win
      - uses: softprops/action-gh-release@v2
        with:
          name: 听力练习助手 ${{ github.ref_name }}
          body: |
            ## 听力练习助手 ${{ github.ref_name }}

            ### 📦 下载
            - 🍎 [macOS 版本](ListeningTrainer-mac.zip)
            - 🪟 [Windows 版本](ListeningTrainer-win.zip)

            ### ✨ 使用说明
            - **macOS**: 解压后把 `.app` 拖到「应用程序」文件夹
            - **Windows**: 解压后运行 `ListeningTrainer.exe`
          files: |
            ListeningTrainer-mac.zip
            ListeningTrainer-win.zip
