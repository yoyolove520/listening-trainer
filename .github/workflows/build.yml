name: 构建打包 (Build)

on:
  # 手动触发：在 GitHub 页面点 "Run workflow"
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空自动生成)'
        required: false
        type: string

  # 推送 tag 时自动触发，例如 git tag v1.0.0 && git push --tags
  push:
    tags:
      - 'v*'

jobs:
  # ─── macOS 构建 ───────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_mac.txt

      - name: 生成 .icns 图标
        run: |
          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512 1024; do
            case $size in
              16)  sips -z 16 16   pic.png --out AppIcon.iconset/icon_16x16.png ;;
              32)  sips -z 32 32   pic.png --out AppIcon.iconset/icon_32x32.png
                   cp AppIcon.iconset/icon_32x32.png AppIcon.iconset/icon_16x16@2x.png ;;
              64)  sips -z 64 64   pic.png --out AppIcon.iconset/icon_32x32@2x.png ;;
              128) sips -z 128 128 pic.png --out AppIcon.iconset/icon_128x128.png ;;
              256) sips -z 256 256 pic.png --out AppIcon.iconset/icon_256x256.png
                   cp AppIcon.iconset/icon_256x256.png AppIcon.iconset/icon_128x128@2x.png ;;
              512) sips -z 512 512 pic.png --out AppIcon.iconset/icon_512x512.png
                   cp AppIcon.iconset/icon_512x512.png AppIcon.iconset/icon_256x256@2x.png ;;
              1024)sips -z 1024 1024 pic.png --out AppIcon.iconset/icon_512x512@2x.png ;;
            esac
          done
          iconutil -c icns AppIcon.iconset
          mv AppIcon.icns app_icon.icns
          rm -rf AppIcon.iconset

      - name: PyInstaller 构建 .app
        run: |
          python -m PyInstaller --noconfirm build_mac.spec

      - name: 压缩 .app
        run: |
          cd dist
          zip -r ListeningTrainer-mac.zip ListeningTrainer.app

      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ListeningTrainer-mac
          path: dist/ListeningTrainer-mac.zip

  # ─── Windows 构建 ─────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 edge-tts aiohttp pyinstaller

      - name: PyInstaller 构建
        run: |
          python -m PyInstaller --noconfirm build.spec

      - name: 压缩构建产物
        run: |
          cd dist
          Compress-Archive -Path ListeningTrainer -DestinationPath ListeningTrainer-win.zip

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ListeningTrainer-win
          path: dist/ListeningTrainer-win.zip

  # ─── 发布 Release（仅推送 tag 时）────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: 下载 macOS 产物
        uses: actions/download-artifact@v4
        with:
          name: ListeningTrainer-mac

      - name: 下载 Windows 产物
        uses: actions/download-artifact@v4
        with:
          name: ListeningTrainer-win

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: 听力练习助手 ${{ github.ref_name }}
          body: |
            ## 听力练习助手 ${{ github.ref_name }}

            ### 📦 下载
            - 🍎 [macOS 版本](ListeningTrainer-mac.zip)
            - 🪟 [Windows 版本](ListeningTrainer-win.zip)

            ### ✨ 使用说明
            - **macOS**: 解压后把 `.app` 拖到「应用程序」文件夹
            - **Windows**: 解压后运行 `ListeningTrainer.exe`
          files: |
            ListeningTrainer-mac.zip
            ListeningTrainer-win.zip
