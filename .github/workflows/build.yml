name: 构建打包 (Build)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空自动生成)'
        required: false
        type: string

  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements_mac.txt
      - name: Generate .icns icon
        run: |
          mkdir -p AppIcon.iconset
          sips -z 16 16   pic.png --out AppIcon.iconset/icon_16x16.png
          sips -z 32 32   pic.png --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32   pic.png --out AppIcon.iconset/icon_32x32.png
          sips -z 64 64   pic.png --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128 pic.png --out AppIcon.iconset/icon_128x128.png
          sips -z 256 256 pic.png --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256 pic.png --out AppIcon.iconset/icon_256x256.png
          sips -z 512 512 pic.png --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512 pic.png --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 pic.png --out AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset
          mv AppIcon.icns app_icon.icns
          rm -rf AppIcon.iconset
      - run: python -m PyInstaller --noconfirm build_mac.spec
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg --overwrite "dist/ListeningTrainer-mac.dmg" "dist/ListeningTrainer.app"
          ls -la dist/ListeningTrainer-mac.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: ListeningTrainer-mac
          path: dist/ListeningTrainer-mac.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python -m PyInstaller --noconfirm build.spec
      - name: Install Inno Setup and compile installer
        env:
          APP_VERSION: ${{ github.ref_name }}
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = Get-ChildItem "${env:ProgramFiles(x86)}\Inno Setup*\ISCC.exe" | Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Host "ISCC: $iscc"
          & $iscc installer_script.iss
      - run: |
          mkdir -p dist
          mv ListeningTrainer_Setup_*.exe dist/
          Get-ChildItem dist/ListeningTrainer_Setup_*.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ListeningTrainer-win
          path: dist/ListeningTrainer_Setup_*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ListeningTrainer-mac
      - uses: actions/download-artifact@v4
        with:
          name: ListeningTrainer-win
      - uses: softprops/action-gh-release@v2
        with:
          name: 听力练习助手 ${{ github.ref_name }}
          body: |
            ## 听力练习助手 ${{ github.ref_name }}

            ### 📦 下载
            - 🍎 [macOS 安装包](ListeningTrainer-mac.dmg)
            - 🪟 [Windows 安装包](ListeningTrainer_Setup_${{ github.ref_name }}.exe)

            ### ✨ 使用说明
            - **macOS**: 打开 .dmg，把 App 拖到「应用程序」文件夹
            - **Windows**: 运行安装程序，按向导完成安装，自动创建桌面快捷方式
          files: |
            ListeningTrainer-mac.dmg
            ListeningTrainer_Setup_*.exe
